# Base experiment config. Override per-experiment by copying this file.

seed: 42

dataset:
  name: tabformer          # tabformer | ieee-cis | paysim
  raw_dir: data/raw
  processed_dir: data/processed
  sequence_length: 32       # number of past transactions per sequence
  test_size: 0.2            # strictly time-ordered, per-user split (no leakage)
  val_size: 0.1

features:
  amount_log: true
  time_deltas: true         # seconds since previous tx
  rolling_aggs: true        # rolling mean/count of spend
  categorical:
    - merchant_category
    - country
    - tx_type

model:
  type: tcn                 # tcn | transformer | xgboost | logreg
  tcn:
    channels: [64, 64, 64]
    kernel_size: 3
    dropout: 0.1
  transformer:              # heavy baseline (TranAD-like)
    d_model: 128
    n_heads: 4
    n_layers: 3

training:
  epochs: 20
  batch_size: 512
  lr: 0.001
  loss: focal               # focal | bce_weighted  (class imbalance)
  focal_gamma: 2.0
  early_stopping_patience: 4

tracking:
  mlflow_uri: http://localhost:5000
  experiment: lean-fraud-detection

artifacts:
  s3_bucket: lean-fraud-artifacts
  model_path: models/tcn.pt
