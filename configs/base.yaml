# Base experiment config. Override per-experiment by copying this file.

seed: 42

dataset:
  name: ieee-cis           # ieee-cis | tabformer | paysim
  raw_dir: data/raw
  processed_dir: data/processed
  sequence_length: 32       # number of past transactions per sequence
  test_size: 0.2            # strict time-based split by TransactionDT (no future in train)
  val_size: 0.1

features:
  amount_log: true
  time_deltas: true         # seconds since previous tx (per user)
  rolling_aggs: true        # causal rolling mean / running count of spend per user
  user_key:                 # IEEE-CIS has no user id; derive a pseudo-user from these
    - card1
    - addr1
    - P_emaildomain
  categorical:              # low-cardinality categoricals, integer-encoded (fit on train)
    - ProductCD
    - card4
    - card6
    - DeviceType

model:
  type: tcn                 # tcn | transformer | xgboost | logreg
  tcn:
    channels: [64, 64, 64]
    kernel_size: 3
    dropout: 0.1
  transformer:              # heavy baseline (TranAD-like)
    d_model: 128
    n_heads: 4
    n_layers: 3

training:
  epochs: 20
  batch_size: 512
  lr: 0.001
  loss: focal               # focal | bce_weighted  (class imbalance)
  focal_gamma: 2.0
  early_stopping_patience: 4

tracking:
  mlflow_uri: http://localhost:5000
  experiment: lean-fraud-detection

artifacts:
  s3_bucket: lean-fraud-artifacts
  model_path: models/tcn.pt
